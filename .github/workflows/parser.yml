name: parser-collect

# Модуль сбора данных (ТЗ §3.1). Два пути запуска — одна и та же команда:
#   • schedule         — по расписанию. Точное время задаётся в АДМИНКЕ (БД), а не здесь:
#                        workflow будится часто (каждые 30 мин), а шаг «Schedule gate»
#                        сверяется с таблицей parse_schedule и парсит только в выбранное
#                        время. Так время меняется из UI без правки этого YAML.
#   • workflow_dispatch — вручную (кнопка в админке дёргает этот же dispatch через API);
#                        гейт не применяется — запускаем сразу.
# Требуется секрет репозитория DATABASE_URL (session pooler, :5432, роль loader).
on:
  schedule:
    - cron: "*/30 * * * *"   # каждые 30 мин; фактическое время парсинга — в админке (gate)
  workflow_dispatch:
    inputs:
      kind:
        description: "Тип источников: web | file"
        default: "web"
      limit:
        description: "Сколько источников за прогон (web, из frontier)"
        default: "200"
      hosts:
        description: "web: хосты через запятую (опционально, вместо frontier)"
        default: ""
      paths:
        description: "file: пути/глобы через запятую"
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt

      # Гейт расписания: только для запуска по cron. Печатает run/kind/limit из БД.
      - name: Schedule gate
        id: gate
        if: ${{ github.event_name == 'schedule' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -X utf8 -m app.scheduling

      # Запускаем парсер, если это ручной dispatch ИЛИ гейт разрешил запуск по расписанию.
      # Параметры по расписанию (kind/limit) берём из БД (вывод гейта), при ручном — из inputs.
      - name: Run parser
        if: ${{ github.event_name != 'schedule' || steps.gate.outputs.run == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -X utf8 -m app.parser \
            --kind  "${{ github.event.inputs.kind  || steps.gate.outputs.kind  || 'web' }}" \
            --limit "${{ github.event.inputs.limit || steps.gate.outputs.limit || '200' }}" \
            --hosts "${{ github.event.inputs.hosts || '' }}" \
            --paths "${{ github.event.inputs.paths || '' }}" \
            --trigger "${{ github.event_name == 'schedule' && 'cron' || 'dispatch' }}"

      # После сбора сырья — пересборка нормализованной витрины и чистка кэша фронта.
      # Шаг можно отключить, если ingest гоняется отдельно.
      - name: Re-ingest (raw -> normalized)
        if: ${{ (github.event_name != 'schedule' || steps.gate.outputs.run == 'true') && (github.event.inputs.kind || steps.gate.outputs.kind || 'web') != 'file' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -X utf8 -m app.ingest || echo "ingest пропущен/недоступен"
